{% load static %}
<!DOCTYPE html>
<html lang="fr">
    <link rel="stylesheet" href="{% static 'style.css' %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li><a href="{% url 'home' %}">Tableau de bord</a></li>
                <li><a href="{% url 'cultures' %}">Cultures</a></li>
                <li><a href="{% url 'parcels' %}">Parcelles</a></li>
                <li><a href="{% url 'observations' %}">Observations</a></li>
                <li><a href="{% url 'alertes' %}">Alertes</a></li>
                <li><a href="{% url 'profile' %}">Profil</a></li>
                <li><a href="{% url 'settings' %}">Paramètres</a></li>
            </ul>
        </aside>
    <main class="main-content">
        <header class="header">
            <h1>Paramètres</h1>
        </header>
        <section class="content-section">
            <h2>Paramètres de l'Application</h2>
            <form>
                <label for="theme">Thème :</label>
                <select id="theme">
                    <option>Clair</option>
                    <option>Sombre</option>
                </select>
                <br>
                <label for="notifications">Notifications :</label>
                <input type="checkbox" id="notifications" checked>
                <br>
                <button type="submit">Sauvegarder</button>
            </form>
        </section>
    </main>
    </div>
</body>
</html>
