{% load static l10n %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier la parcelle</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li><a href="{% url 'home' %}">Tableau de bord</a></li>
                <li><a href="{% url 'cultures' %}">Cultures</a></li>
                <li><a href="{% url 'parcels' %}">Parcelles</a></li>
                <li><a href="{% url 'observations' %}">Observations</a></li>
                <li><a href="{% url 'alertes' %}">Alertes ({{ nbralerte }})</a></li>
                <li><a href="{% url 'profile' %}">Profil</a></li>
                <li><a href="{% url 'settings' %}">Paramètres</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Modifier la parcelle</h1>
            </header>
            <section class="content-section">
                <form method="post" action="{% url 'edit_parcelle' parcelle.id %}">
                    {% csrf_token %}
                    <label for="nom">Nom de la parcelle</label>
                    <input id="nom" name="nom" type="text" value="{{ parcelle.nom }}" required>

                    <label for="localisation">Localisation</label>
                    <input id="localisation" name="localisation" type="text" value="{{ parcelle.localisation }}" required>

                    <label for="surface_ha">Surface (ha)</label>
                    <input id="surface_ha" name="surface_ha" type="number" step="0.01" value="{{ parcelle.surface_ha|unlocalize }}" required>

                    <button type="submit">Enregistrer</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
