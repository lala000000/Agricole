{% load static %}
<!DOCTYPE html>
<html lang="fr">
    <link rel="stylesheet" href="{% static 'style.css' %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observations</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li><a href="{% url 'home' %}">Tableau de bord</a></li>
                <li><a href="{% url 'cultures' %}">Cultures</a></li>
                <li><a href="{% url 'parcels' %}">Parcelles</a></li>
                <li><a href="{% url 'observations' %}">Observations</a></li>
                <li><a href="{% url 'alertes' %}">Alertes</a></li>
                <li><a href="{% url 'profile' %}">Profil</a></li>
                <li><a href="{% url 'settings' %}">Paramètres</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="header">
                <h1>Observations</h1>
                <button class="add-btn">+ Nouvelle</button>
            </header>
            <section class="new-observation">
                <h2>Nouvelle observation</h2>
                <form>
                    <label for="parcel">Parcelle:</label>
                    <select id="parcel">
                        <option>Parcelle A</option>
                        <option>Parcelle B</option>
                    </select>
                    <label for="type">Type:</label>
                    <select id="type">
                        <option>Sol</option>
                        <option>Plante</option>
                    </select>
                    <label for="comment">Commentaire:</label>
                    <textarea id="comment"></textarea>
                    <label for="photo">Photo:</label>
                    <input type="file" id="photo">
                    <button type="submit">Enregistrer</button>
                </form>
            </section>
            <section class="history">
                <h2>Historique</h2>
                <ul>
                    <li>Parcelle A : "Sol sec" (aujourd’hui)</li>
                    <li>Parcelle B : "Insectes observés" (hier)</li>
                </ul>
            </section>
        </main>
    </div>
</body>
</html>
